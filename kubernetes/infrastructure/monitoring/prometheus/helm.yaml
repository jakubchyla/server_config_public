---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-helmrepository
  namespace: monitoring
spec:
  interval: 1h
  url: https://prometheus-community.github.io/helm-charts

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmChart
metadata:
  name: prometheus-helmchart
  namespace: monitoring
spec:
  chart: kube-prometheus-stack
  interval: 10m
  version: ">=81.0.0"
  sourceRef:
    kind: HelmRepository
    name: prometheus-helmrepository

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-helmrelease
  namespace: monitoring
spec:
  chartRef:
    kind: HelmChart
    name: prometheus-helmchart
    namespace: monitoring
  interval: 15m
  timeout: 5m
  install:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  upgrade:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    crds:
      enabled: false
    prometheus:
      prometheusSpec:
        retention: 7d
        resources:
          requests:
            memory: 512Mi
          limits:
            memory: 1Gi

    grafana:
      admin:
        existingSecret: grafana-admin-creds
        userKey: admin-user
        passwordKey: admin-password
      deploymentStrategy:
        type: Recreate
      securityContext:
        runAsUser: 472
        fsGroup: 472
      grafana.ini:
        server:
          domain: jakubchyla.com
          root_url: "%(protocol)s://%(domain)s"

    nodeExporter:
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists

      resources:
        requests:
          memory: 256Mi
        limits:
          memory: 512Mi