---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: coredns-helmrepository
  namespace: coredns
spec:
  interval: 1h
  url: https://coredns.github.io/helm

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmChart
metadata:
  name: coredns-helmchart
  namespace: coredns
spec:
  chart: coredns
  interval: 10m
  version: ">=1.45.0"
  sourceRef:
    kind: HelmRepository
    name: coredns-helmrepository

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coredns-helmrelease
  namespace: coredns
spec:
  chartRef:
    kind: HelmChart
    name: coredns-helmchart
    namespace: coredns
  interval: 15m
  timeout: 5m
  install:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  upgrade:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    isClusterService: false
    serviceType: LoadBalancer

    zoneFiles:
      - filename: jakubchyla.com.db
        domain: local
        contents: |
          $ORIGIN jakubchyla.com.
          $TTL 300
          @   IN SOA ns1.jakubchyla.com. admin.jakubchyla.com. (
              2024010101
              7200
              3600
              1209600
              300 )

          @   IN NS  ns1

          @   IN A   <ip address>

          ns1 IN A   <ip address>

          * IN A   <ip address>

    servers:
      - zones:
        - zone: jakubchyla.com
        port: 53
        plugins:
        - name: errors
        - name: log
        - name: file
          parameters: /etc/coredns/jakubchyla.com.db

      - zones:
        - zone: .
        port: 53
        plugins:
        - name: errors
        - name: health
          configBlock: |-
            lameduck 5s
        - name: ready
        - name: prometheus
          parameters: 0.0.0.0:9153
        - name: forward
          parameters: . 1.1.1.1 8.8.8.8
          configBlock: |-
            max_concurrent 1000
        - name: cache
          parameters: 30
        - name: reload
    resources:
      limits:
        memory: 256Mi
        cpu: 500m
      requests:
        memory: 128Mi
        cpu: 100m
