apiVersion: v1
kind: Service
metadata:
  name: syncthing-service-data
  namespace: syncthing
spec:
  type: LoadBalancer
  selector:
    app: syncthing
  ports:
  - name: tcp-22000
    port: 22000
    targetPort: 22000
    protocol: TCP
  - name: udp-22000
    port: 22000
    targetPort: 22000
    protocol: UDP
  - name: udp-21027
    port: 21027
    targetPort: 21027
    protocol: UDP

---
apiVersion: v1
kind: Service
metadata:
  name: syncthing-service-ui
spec:
  type: ClusterIP
  selector:
    app: syncthing
  ports:
  - name: tcp-8384
    port: 8384
    targetPort: 8384
    protocol: TCP


---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: syncthing-ingress
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-issuer
  labels:
    app.kubernetes.io/name: syncthing-ingress
spec:
  tls:
    - hosts:
      - syncthing.jakubchyla.com
      secretName: syncthing-tls
  rules:
  - host: syncthing.jakubchyla.com
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: syncthing-service-ui
            port:
              number: 8384

